<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velkommen | aevaksnes</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #ededed;
            --accent: #008080;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--card-bg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #ff7f24;
        }

        p {
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--text);
            color: var(--bg);
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            background-color: var(--accent);
            color: #000;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #444;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="assets/logo.png" alt="Logo" width="64" height="64">

        <h1>aevaksnes</h1>
        <p>Welcome. I have made a designated webpage to present my programming projects. Do you want to check it out?
            It's on Vercel.</p>

        <a href="https://aevaksnes.vercel.app/" class="btn">Explore My Projects</a>

        <div class="footer">
            HOSTED ON VERCEL 2.0
        </div>
    </div>

</body>

</html>
